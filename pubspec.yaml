name: wishes
description: A Flutter application for managing shopping wishes and purchase lists.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # 路由管理
  go_router: ^14.8.1

  # 网络请求
  dio: ^5.7.0

  # WebView (用于OAuth授权页面)
  webview_flutter: ^4.10.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 加密存储
  flutter_secure_storage: ^9.2.4

  # 图片加载
  cached_network_image: ^3.4.1

  # 动画
  flutter_motion_ui: ^1.0.3

  # UI组件
  getwidget: ^4.0.0

  # 工具
  intl: ^0.19.0
  logger: ^2.5.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  crypto: ^3.0.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0

  # 测试
  mockito: ^5.4.4

  # 代码规范
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
